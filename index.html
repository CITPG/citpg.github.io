/* ================= RESET ================= */
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Poppins,sans-serif;
  background:linear-gradient(180deg,#020617,#020617);

/* ================= LOGIN ================= */
#loginSection{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.login-box{
  background:#1e293b;
  padding:30px;
  border-radius:16px;

  box-shadow:0 20px 60px rgba(0,0,0,.6);
}
.login-box h2{

  margin-bottom:20px;
}
.login-box input{
  width:100%;

  border-radius:8px;
}
.login-box button{

.container{

.title{
  text-align:center;
  margin-bottom:20px;
  color: #facc15;

/* ===== LOCKED CONTENT STYLE (FINAL WORKING) ===== */

.locked {
  pointer-events: none;
  position: relative;
}

/* Dark overlay */
.locked::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 90;
}

/* Lock message wrer */
.lock-msg {
  display: none;
}

.locked .lock-msg {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 100;
  text-align: center;
}

/* 🔒 title */
.lock-msg .lock-title {
  font-size: 32px;
  font-weight: 700;
  color: #ef4444; /* 🔴 RED */
  margin-bottom: 8px;
  text-shadow: 0 0 15px rgba(0,0,0,0.9);
}

/* payment text */
.lock-msg .lock-sub {
  font-size: 18px;
  color: #facc15; /* 🟡 YELLOW */
  text-shadow: 0 0 10px rgba(0,0,0,0.9);
}



    

/* ================= ACCORDION ================= */
.phase{
  background:rgba(255,255,255,.05);
  border-radius:14px;
  margin-bottom:16px;
  overflow:hidden;
}
.phase-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px;
  cursor:pointer;
}
.phase-header .icon{
  font-size:20px;
  transition:.4s;
}
.phase.open .icon{
  transform:rotate(45deg);
}
.phase-body{
  height:0;
  overflow:hidden;
  transition:height .4s ease;
}

/* ================= LESSON GRID ================= */
.lessons{
  padding:16px;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
}
.lesson-btn{
  background:#072036;
  border:none;
  color:#fff;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
}

.lesson-btn.is-disabled{
  opacity:0.4;
  cursor:not-allowed;
  pointer-events:none; /* 🔴 আসল জিনিস */
  filter:grayscale(100%);
}

    
    
    
@media(max-width:768px){
  .lessons{grid-template-columns:repeat(2,1fr);}
}

/* ================= CINEMATIC POPUP ================= */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:.25s;
  z-index:9999;
}
.modal.show{
  opacity:1;
  pointer-events:auto;
}

.video-card{
  width:92%;
  max-width:1200px;
  background:#000;
  border-radius:18px;
  overflow:hidden;
  position:relative;
  border:2px solid rgba(255,255,255,0.85);
}

.video-frame{

  padding-top:56.25%;
}
.video-frame iframe{

  inset:0;
  width:100%;
  height:100%;
  border:0;

.close-btn{

  top:14px;
  right:14px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#ef4444;
  border:none;
  color:#fff;
  font-size:20px;
  cursor:pointer;

/* ================= ONLINE INDICATOR ================= */

/* USER BADGE FIX */

  display:flex;
  align-items:center;
  gap:6px;
  font-size:14px;
}

<script>

const USERS = [
  {
    u:"admin",

  }
];


/* ================= SESSION LIMIT ================= */
const LIMIT = 12 * 60 * 60 * 1000; // ✅ এইটা missing ছিল    
    

/* ================= AUTO LOGIN ================= */
const session = JSON.parse(localStorage.getItem("session"));
if(session){
  if(session.role==="admin" || Date.now()-session.time<LIMIT){
    showDashboard(session);
  }else{
    localStorage.clear();
  }
}

/* ================= LOGIN ================= */
function login(){
  const u = username.value.trim();
  const p = password.value.trim();
  const user = USERS.find(x=>x.u===u && x.p===p);
  if(!user){ alert("Invalid login"); return; }

  const data = {...user,time:Date.now()};
  localStorage.setItem("session",JSON.stringify(data));
  showDashboard(data);
}

    
    
function applyAccessControl(user){
  const sections = document.querySelectorAll(".container");

  if(user.allowedSections === "all") return;

  sections.forEach(section=>{
    const id = section.dataset.section;
    if(!user.allowedSections.includes(id)){
      section.classList.add("locked");
    }
  });
}
  
    
    
    
function showDashboard(user){
  loginSection.style.display="none";
  dashboard.style.display="block";

  userInfo.innerHTML = `
    👤 Welcome,
    <span class="online-dot"></span>
    <strong>${user.name}</strong>
    ${
      user.role === "admin"
        ? `<span class="admin-badge">👑 Admin</span>`
        : `<span class="admin-badge" style="background:#22c55e">⭐ Active</span>`
    }
  `;
    
      applyAccessControl(user); // 🔥 এই লাইনটা ছিল না
}


/* ================= LOGOUT ================= */
function logout(){
  localStorage.clear();
  location.reload();
}

/* ================= ACCORDION ================= */
document.querySelectorAll(".phase-header").forEach(h=>{
  h.addEventListener("click",()=>{
    const p = h.parentElement;
    const body = p.querySelector(".phase-body");

    if(p.classList.contains("open")){
      body.style.height="0px";
      p.classList.remove("open");
    }else{
      document.querySelectorAll(".phase").forEach(x=>{
        x.classList.remove("open");
        x.querySelector(".phase-body").style.height="0px";
      });
      p.classList.add("open");
      body.style.height = body.scrollHeight+"px";
    }
  });
});

/* ================= LESSON BUTTON HANDLER (FIXED) ================= */
document.querySelectorAll(".lesson-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{

    /* 🔴 Disabled */
    if(btn.classList.contains("is-disabled")) return;

    /* 🟢 Google Drive */
    if(btn.dataset.link){
      window.open(btn.dataset.link, "_blank");
      return;
    }

    /* 🎬 YouTube Video */
    if(btn.dataset.v){
      videoFrame.innerHTML = `
        <iframe 
          src="https://www.youtube.com/embed/${btn.dataset.v}?autoplay=1&rel=0"
          allow="autoplay; encrypted-media"
          allowfullscreen>
        </iframe>`;
      modal.classList.add("show");
      document.body.style.overflow="hidden";
    }

  });
});

/* ================= CLOSE MODAL ================= */
function closeModal(){
  modal.classList.remove("show");
  videoFrame.innerHTML="";
  document.body.style.overflow="";
}
</script>

     <script>
  // Disable Right Click
  window.oncontextmenu = () => false;

  // Function to block certain keys
  function blockKeys(e) {
    // F12
    if (e.key === "F12") {
      e.preventDefault();
      e.stopImmediatePropagation();
      return false;
    }

    // Ctrl + S
    if (e.ctrlKey && (e.key === "s" || e.key === "S")) {
      e.preventDefault();
      e.stopImmediatePropagation();
      return false;
    }

    // Ctrl + U
    if (e.ctrlKey && (e.key === "u" || e.key === "U")) {
      e.preventDefault();
      e.stopImmediatePropagation();
      return false;
    }

    // Ctrl + Shift + I / J
    if (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J")) {
      e.preventDefault();
      e.stopImmediatePropagation();
      return false;
    }
  }

  // Attach listeners
  ["keydown", "keypress", "keyup"].forEach(evt => {
    document.addEventListener(evt, blockKeys, true); // capture phase
  });
</script>
